name: Bug report
description: Reportar un error en la landing, dashboard u ops
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: ¿Qué pasó?
      description: Describe el bug. ¿Qué esperabas que pasara?
      placeholder: Al hacer click en X esperaba Y, pero pasó Z.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Área afectada
      options:
        - Landing pública
        - /dashboard
        - /ops
        - API
        - Base de datos / Supabase
        - Infra / deploy
        - Otro
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Pasos para reproducir
      placeholder: |
        1. Ir a ...
        2. Hacer click en ...
        3. Ver el error
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: URL donde ocurre
      placeholder: https://bootcampsinergetico.com/...
  - type: textarea
    id: context
    attributes:
      label: Contexto adicional
      description: Logs, screenshots, navegador, dispositivo, etc.
